<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber System</title>

<style>
body{
margin:0;
background:black;
color:#00ff9f;
font-family:monospace;
overflow:hidden;
}

/* MATRIX */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:black;
}

#type{
white-space:pre-line;
text-align:center;
font-size:16px;
text-shadow:0 0 10px #00ff9f;
}

/* MAIN */
#main{
opacity:0;
transition:1s;
padding:15px;
}

/* PROFILE */
.profile{
text-align:center;
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
border:2px solid #00ff9f;
box-shadow:0 0 25px #00ff9f;
}

#name::after{
content:"|";
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

/* BOX */
.box{
border:1px solid #00ff9f;
padding:12px;
margin:10px 0;
border-radius:10px;
background:rgba(0,255,159,0.05);
opacity:0;
transform:translateY(20px);
animation:up 0.6s forwards;
}

@keyframes up{
to{opacity:1;transform:translateY(0);}
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin:5px 0;
background:black;
border:1px solid #00ff9f;
color:#00ff9f;
cursor:pointer;
border-radius:8px;
}

button:hover{
background:#00ff9f;
color:black;
}

/* OUTPUT */
#out{
margin-top:10px;
font-size:13px;
white-space:pre-line;
}

/* LOG */
#log{
height:120px;
overflow:auto;
border:1px solid #00ff9f;
padding:8px;
font-size:12px;
margin-top:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- INTRO -->
<div id="intro">
<div id="type"></div>
</div>

<!-- MAIN -->
<div id="main">

<div class="profile">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhgtMl3KB6JTvqariXvg5RsFw3_lbBNOShjsQdCvvvuyOHA-fgoKWWX5dh_jufQM9Ji042weDM_Pdp6wc2AecMIUhUd5GQjgY5L3jLWOJMaNWuf3nQP1lv5TPyZ_Dc8dPYXL3olXA7WhzT-fb_9Z6N_ppGRtH75jB0_Q62u1FnraMbpgZtm1kd8dm3toRg/s1517/Screenshot_20260430_201858.jpg">

<h2 id="name"></h2>
<p>Cyber Security Learner</p>
</div>

<div class="box">
<button onclick="openModule('network')">Network Security</button>
<button onclick="openModule('web')">Web Security</button>
<button onclick="openModule('crypto')">Cryptography</button>
<button onclick="openModule('soc')">SOC Monitoring</button>
</div>

<div class="box">
📘 OUTPUT
<div id="out">Select module...</div>
</div>

<div class="box">
📡 LOG
<div id="log"></div>
</div>

</div>

<script>

/* MATRIX EFFECT */
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let letters="01";
let fontSize=14;
let columns=c.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ff9f";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>c.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);

/* SOUND */
function beep(){
let ctx2=new (window.AudioContext||window.webkitAudioContext)();
let o=ctx2.createOscillator();
o.frequency.value=600;
o.connect(ctx2.destination);
o.start();
o.stop(ctx2.currentTime+0.05);
}

/* INTRO */
let intro=`INITIALIZING SYSTEM...
LOADING MODULES...
স্বাগতম`;

let i=0;

function typeIntro(){
if(i<intro.length){
document.getElementById("type").innerText+=intro[i];
beep();
i++;
setTimeout(typeIntro,40);
}else{
setTimeout(startMain,1000);
}
}
typeIntro();

/* MAIN */
function startMain(){
document.getElementById("intro").style.display="none";
document.getElementById("main").style.opacity="1";
typeName();
animateBoxes();
log("SYSTEM READY ✔");
}

/* NAME */
let nameText="S A MUNNA";
let ni=0;

function typeName(){
if(ni<nameText.length){
document.getElementById("name").innerHTML+=nameText[ni];
ni++;
setTimeout(typeName,120);
}
}

/* BOX ANIMATION */
function animateBoxes(){
let boxes=document.querySelectorAll(".box");
boxes.forEach((b,i)=>{
b.style.animationDelay=(i*0.2)+"s";
});
}

/* LOG */
function log(msg){
document.getElementById("log").innerHTML+="> "+msg+"<br>";
}

/* MODULE */
function openModule(x){
let text="";

if(x==="network") text="🌐 Network Security\nProtects network.";
if(x==="web") text="🌍 Web Security\nProtects websites.";
if(x==="crypto") text="🔑 Cryptography\nEncrypts data.";
if(x==="soc") text="📡 SOC\nLive monitoring.";

document.getElementById("out").innerText=text;
log("Opened: "+x);
}

</script>

</body>
</html>
