<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>S A MUNNA | SYSTEM EXPLOIT</title>
    <style>
        :root { --neon: #0f0; --dim: rgba(0, 255, 0, 0.2); --alert: #f00; }
        body, html { background: #000; color: var(--neon); margin: 0; padding: 0; font-family: 'Courier New', monospace; overflow-x: hidden; height: 100vh; }
        
        /* CRT Scanline Effect */
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; }

        #matrix-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.1; }
        .container { max-width: 700px; margin: auto; padding: 20px; position: relative; z-index: 10; }

        /* Header & Profile */
        .glitch-header { font-size: 2.5em; font-weight: bold; text-shadow: 0 0 10px var(--neon); animation: glitch 2s infinite; letter-spacing: 5px; }
        .p-img { width: 130px; height: 130px; border-radius: 50%; border: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon); margin: 15px 0; object-fit: cover; }

        /* Modern Intel Box */
        .intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .intel-card { border: 1px solid var(--neon); background: rgba(0, 20, 0, 0.6); padding: 10px; font-size: 11px; text-align: left; }
        .alert { border-color: var(--alert); color: var(--alert); }

        /* Terminal UI */
        .terminal { background: rgba(0, 10, 0, 0.9); border: 1px solid var(--neon); padding: 15px; text-align: left; min-height: 180px; font-size: 13px; position: relative; overflow: hidden; box-shadow: inset 0 0 20px var(--dim); }
        .log-stream { position: absolute; bottom: 5px; right: 5px; font-size: 9px; color: var(--dim); text-align: right; }

        /* Messenger */
        .chat-wrap { background: #050505; border: 1px solid var(--neon); margin-top: 20px; border-radius: 4px; overflow: hidden; }
        .chat-head { background: var(--neon); color: #000; padding: 5px 10px; font-weight: bold; font-size: 12px; display: flex; justify-content: space-between; }
        #chat-body { height: 250px; overflow-y: auto; padding: 15px; font-size: 13px; scroll-behavior: smooth; }
        .input-box { display: flex; border-top: 1px solid var(--neon); }
        input { flex: 1; background: #000; border: none; color: var(--neon); padding: 12px; outline: none; font-family: inherit; }
        button { background: var(--neon); color: #000; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }

        /* Access Screen */
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .lock-msg { color: var(--neon); font-size: 14px; margin-bottom: 20px; animation: blink 1s infinite; }

        @keyframes glitch { 0% { transform: skew(0deg); } 2% { transform: skew(10deg); } 4% { transform: skew(-10deg); } 6% { transform: skew(0deg); } }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="overlay" onclick="boot()">
    <div class="lock-msg">> [ SYSTEM LOCKED ]</div>
    <button style="background:transparent; border:1px solid #0f0; color:#0f0; padding:10px 20px; font-family:inherit;">INITIALIZE BREACH</button>
</div>

<canvas id="matrix-bg"></canvas>
<audio id="snd-granted" src="https://www.myinstants.com/media/sounds/access-granted.mp3"></audio>
<audio id="snd-click" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>

<div class="container">
    <div class="glitch-header">S A MUNNA</div>
    <img class="p-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH16E5MeqQdyYOx9sj5KIgDIAoAqkZGy99RPt0LSePXM_ctq8SR-Cba0mLDX4ovQ_wGh8tSxjJ_cREXxHMbOd9zLkRISichjh3grw2YmsP9SozbQsdNpWxLgyrw9iX8_I8Xb8MQak8obXDrVrF0Ft-LaVDYSQ73CtzDWA20iKevgTK7RYPJVHIc31odo0/s2048/Picsart_26-04-27_00-47-36-554.jpg" />

    <div class="intel-grid">
        <div class="intel-card">
            [+] STATUS: <span style="color:#fff">ENCRYPTED</span><br/>
            [+] NODE: <span style="color:#fff">BD_SVR_09</span>
        </div>
        <div class="intel-card alert">
            [!] TARGET_IP: <span id="v-ip">FETCHING...</span><br/>
            [!] BATTERY: <span id="v-bat">...</span>
        </div>
    </div>

    <div class="terminal">
        <div id="out"></div>
        <div class="log-stream" id="logs"></div>
    </div>

    <div class="chat-wrap">
        <div class="chat-head">
            <span>TERMINAL_COMMS_v9.2</span>
            <span>SECURE</span>
        </div>
        <div id="chat-body">
            <div style="color:var(--neon)">> Waiting for incoming connection...</div>
        </div>
        <div class="input-box">
            <input id="m-inp" placeholder="Type command..." type="text" autocomplete="off" />
            <button onclick="sendMsg()">EXECUTE</button>
        </div>
    </div>
</div>

<script>
    // Matrix BG
    const c = document.getElementById('matrix-bg');
    const ctx = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const drops = Array(Math.floor(c.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
        ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
            if(y*16 > c.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }
    setInterval(draw, 50);

    // Boot & Typing
    const script = [
        "> Bypass Firewall... SUCCESS",
        "> Injecting Munna_Payload.exe...",
        "> Intercepting local packets...",
        "> Root Access: GRANTED (0x552)",
        "> Operational Status: LURKING"
    ];
    let lIdx = 0, cIdx = 0;

    function boot() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('snd-granted').play();
        type();
        fetchData();
        setInterval(randomLogs, 1500);
    }

    function type() {
        const out = document.getElementById('out');
        if (lIdx < script.length) {
            if (cIdx < script[lIdx].length) {
                out.innerHTML += script[lIdx].charAt(cIdx);
                cIdx++;
                setTimeout(type, 40);
            } else {
                out.innerHTML += "<br/>";
                lIdx++; cIdx = 0;
                setTimeout(type, 500);
            }
        }
    }

    function randomLogs() {
        const logs = document.getElementById('logs');
        const fakeIps = ["192.168.0.1", "127.0.0.1", "45.77.12.9", "8.8.8.8"];
        const msg = ["GET /admin", "POST /login", "SQL_INJECT", "PING"];
        logs.innerHTML = `${fakeIps[Math.floor(Math.random()*4)]} -> ${msg[Math.floor(Math.random()*4)]}... OK`;
    }

    function fetchData() {
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
            document.getElementById('v-ip').innerText = d.ip;
        });
        navigator.getBattery().then(b => {
            document.getElementById('v-bat').innerText = (b.level * 100) + "%";
        });
    }

    function sendMsg() {
        const inp = document.getElementById('m-inp');
        if(!inp.value) return;
        document.getElementById('snd-click').cloneNode().play();
        const body = document.getElementById('chat-body');
        body.innerHTML += `<div style="color:#fff; margin-top:5px;">USR@MUNNA:~$ ${inp.value}</div>`;
        
        fetch(`https://api.telegram.org/bot8665353987:AAE8qj8bVbN5JSOHr1yBzd4y0gP86BpXSkI/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: '8444393519', text: `🎯 Munna Site Alert!\n💬 Command: ${inp.value}\n🌐 IP: ${document.getElementById('v-ip').innerText}` })
        });
        
        inp.value = '';
        body.scrollTop = body.scrollHeight;
    }
</script>
</body>
</html>
