<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Terminal</title>

<style>
body{
margin:0;
background:black;
color:#00ff9f;
font-family:monospace;
overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#terminal{
padding:15px;
white-space:pre-line;
font-size:14px;
}

.box{
border:1px solid #00ff9f;
padding:10px;
margin-top:10px;
}

button{
background:black;
color:#00ff9f;
border:1px solid #00ff9f;
padding:8px;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="terminal">

> INITIALIZING SYSTEM...
> LOADING CYBER MODULES...
> ACCESS GRANTED ✔

<div class="box">
🛡 CYBER SECURITY LAB
<button onclick="scan()">RUN SECURITY SCAN</button>
</div>

<div class="box" id="output">STATUS: READY</div>

</div>

<script>

/* MATRIX EFFECT */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let letters="01";
let drops=[];
for(let i=0;i<100;i++) drops[i]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ff9f";
ctx.font="14px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*14,drops[i]*14);

if(drops[i]*14>c.height) drops[i]=0;
drops[i]++;
}
}

setInterval(draw,30);

/* SCAN SIMULATION */
function scan(){

let steps=[
"Scanning network...",
"Checking firewall...",
"Analyzing ports...",
"Detecting vulnerabilities...",
"Encrypting system...",
"✔ SYSTEM SECURE"
];

let i=0;
let out=document.getElementById("output");
out.innerText="";

let interval=setInterval(()=>{
out.innerText+=steps[i]+"\n";
i++;
if(i>=steps.length) clearInterval(interval);
},600);
}

</script>

</body>
</html>
