<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Dashboard</title>

<style>
body{
margin:0;
background:black;
color:#00ff9f;
font-family:monospace;
}

/* GRID */
.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

/* CARD */
.card{
border:1px solid #00ff9f;
padding:10px;
background:rgba(0,255,159,0.05);
}

/* PROFILE */
.profile{
grid-column:1/3;
text-align:center;
}

.profile img{
width:90px;
border-radius:50%;
border:2px solid #00ff9f;
}

/* TERMINAL */
#terminal{
height:150px;
overflow:auto;
font-size:12px;
}

/* BAR */
.bar{
height:10px;
background:#003f2f;
margin-top:5px;
}

.fill{
height:100%;
background:#00ff9f;
width:50%;
}
</style>
</head>

<body>

<div class="container">

<div class="card profile">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhgtMl3KB6JTvqariXvg5RsFw3_lbBNOShjsQdCvvvuyOHA-fgoKWWX5dh_jufQM9Ji042weDM_Pdp6wc2AecMIUhUd5GQjgY5L3jLWOJMaNWuf3nQP1lv5TPyZ_Dc8dPYXL3olXA7WhzT-fb_9Z6N_ppGRtH75jB0_Q62u1FnraMbpgZtm1kd8dm3toRg/s1517/Screenshot_20260430_201858.jpg">
<h3>S A MUNNA</h3>
<p>Cyber Security Analyst</p>
</div>

<div class="card">
<h4>🖥 CPU LOAD</h4>
<div class="bar"><div id="cpu" class="fill"></div></div>
</div>

<div class="card">
<h4>🌐 NETWORK</h4>
<div class="bar"><div id="net" class="fill"></div></div>
</div>

<div class="card">
<h4>⚠ THREAT LEVEL</h4>
<div class="bar"><div id="threat" class="fill"></div></div>
</div>

<div class="card">
<h4>🔎 LIVE SCAN</h4>
<div id="scan">Scanning...</div>
</div>

<div class="card">
<h4>💻 TERMINAL</h4>
<div id="terminal">> SYSTEM ONLINE</div>
</div>

</div>

<script>

/* RANDOM BAR */
function updateBar(id){
let val=Math.floor(Math.random()*100);
document.getElementById(id).style.width=val+"%";
}

/* UPDATE LOOP */
setInterval(()=>{
updateBar("cpu");
updateBar("net");
updateBar("threat");
},2000);

/* TERMINAL LOG */
function log(t){
let term=document.getElementById("terminal");
term.innerText+="\n> "+t;
term.scrollTop=99999;
}

/* SCAN TEXT */
let scans=[
"Scanning IP traffic...",
"Checking open ports...",
"Firewall active and stable...",
"No threat detected...",
"Analyzing incoming packets...",
"Monitoring suspicious activity..."
];

setInterval(()=>{
let s=scans[Math.floor(Math.random()*scans.length)];
document.getElementById("scan").innerText=s;
log(s);
},3000);

/* 🔊 BACKGROUND SOUND */
let bgSound = new Audio("https://www.soundjay.com/mechanical/sounds/keyboard-typing-03.mp3");
bgSound.loop = true;
bgSound.volume = 0.15;

/* 🎤 VOICE */
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang="en-US";
s.rate=0.9;
s.pitch=0.3;
window.speechSynthesis.speak(s);
}

/* VOICE LINES */
let voiceLines = [
"System security is active",
"Monitoring network traffic",
"All systems are stable",
"No intrusion detected",
"Firewall protection enabled",
"Analyzing cyber threats",
"Security protocols running",
"System is fully protected"
];

/* START SYSTEM */
document.body.addEventListener("click",()=>{
bgSound.play();
speak("Cyber security system activated");
});

/* AUTO VOICE */
setInterval(()=>{
let line = voiceLines[Math.floor(Math.random()*voiceLines.length)];
speak(line);
log(line);
},8000);

</script>

</body>
</html>
