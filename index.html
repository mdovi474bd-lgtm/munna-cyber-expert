<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD JARVIS AI</title>

<style>
body{
margin:0;
background:black;
color:#00ffe5;
font-family:monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HUD */
.hud{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:340px;
height:340px;
border-radius:50%;
border:2px solid #00ffe5;
box-shadow:0 0 60px #00ffe5;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

button{
margin:5px;
padding:8px 12px;
background:black;
border:1px solid #00ffe5;
color:#00ffe5;
cursor:pointer;
}

#chat{
position:absolute;
bottom:10px;
left:10px;
width:320px;
height:140px;
overflow:auto;
border:1px solid #00ffe5;
padding:5px;
font-size:12px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="hud">

<h2>GOD JARVIS</h2>
<p id="status">OFFLINE</p>

<button onclick="start()">ACTIVATE</button>
<button onclick="voice()">🎤 TALK</button>

</div>

<div id="chat"></div>

<script>

/* ===== BACKGROUND ===== */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let nodes=[];
for(let i=0;i<90;i++){
nodes.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
dx:(Math.random()-0.5)*2,
dy:(Math.random()-0.5)*2
});
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ffe5";

nodes.forEach(n=>{
ctx.fillRect(n.x,n.y,2,2);
n.x+=n.dx;
n.y+=n.dy;

if(n.x<0||n.x>c.width) n.dx*=-1;
if(n.y<0||n.y>c.height) n.dy*=-1;
});
}
setInterval(draw,30);

/* ===== SPEECH ===== */
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang="en-US";
s.rate=1;
window.speechSynthesis.speak(s);
}

/* ===== CHAT ===== */
function add(msg){
document.getElementById("chat").innerHTML+="<div>> "+msg+"</div>";
}

/* ===== OPENAI API ===== */
const API_KEY="YOUR_OPENAI_API_KEY"; // এখানে বসাও

async function askAI(text){

let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:"You are JARVIS GOD MODE AI assistant. Reply naturally in Bangla or English."
},
{
role:"user",
content:text
}
]
})
});

let data=await res.json();
return data.choices[0].message.content;
}

/* ===== START ===== */
function start(){
document.getElementById("status").innerText="ONLINE (GOD MODE)";
speak("GOD JARVIS activated");
}

/* ===== VOICE ===== */
function voice(){

let SR=window.SpeechRecognition||window.webkitSpeechRecognition;

if(!SR){
alert("Voice not supported");
return;
}

let rec=new SR();
rec.lang="en-US";
rec.start();

rec.onresult=async function(e){
let text=e.results[0][0].transcript;

add("YOU: "+text);

let reply=await askAI(text);

add("AI: "+reply);

speak(reply);
};
}

</script>

</body>
</html>
