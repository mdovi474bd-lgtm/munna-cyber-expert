<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Ultimate</title>

<style>
body{
margin:0;
background:black;
color:#00ff9f;
font-family:monospace;
overflow:hidden;
}

/* MAP */
#map{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:black;
z-index:999;
}

#type{
white-space:pre-line;
text-align:center;
}

/* BUTTON */
#startBtn{
padding:10px 20px;
border:1px solid #00ff9f;
background:black;
color:#00ff9f;
cursor:pointer;
margin-top:15px;
}

/* MAIN */
#main{
opacity:0;
transition:1s;
padding:10px;
}

/* BOX */
.box{
border:1px solid #00ff9f;
padding:10px;
margin:8px 0;
background:rgba(0,255,159,0.05);
}

/* CHAT */
#chat{
height:150px;
overflow:auto;
border:1px solid #00ff9f;
padding:5px;
font-size:12px;
}

input{
width:100%;
padding:8px;
background:black;
color:#00ff9f;
border:1px solid #00ff9f;
}
</style>
</head>

<body>

<canvas id="map"></canvas>

<!-- INTRO -->
<div id="intro">
<div id="type"></div>
<button id="startBtn" onclick="startSystem()">ENTER SYSTEM</button>
</div>

<!-- MAIN -->
<div id="main">

<div class="box">🧠 CYBER SYSTEM ACTIVE</div>

<div class="box">🌍 GLOBAL MAP RUNNING</div>

<div class="box">🔊 SOUND ACTIVE</div>

<div class="box">
🤖 AI CHAT (বাংলা + English)

<div id="chat"></div>
<input placeholder="Type here..." onkeydown="send(event)">
</div>

</div>

<script>

/* ===== MAP ===== */
let c=document.getElementById("map");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let pts=[];
for(let i=0;i<60;i++){
pts.push({x:Math.random()*c.width,y:Math.random()*c.height,dx:(Math.random()-0.5)*2,dy:(Math.random()-0.5)*2});
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff9f";

pts.forEach(p=>{
ctx.fillRect(p.x,p.y,2,2);
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>c.width) p.dx*=-1;
if(p.y<0||p.y>c.height) p.dy*=-1;
});
}
setInterval(draw,30);

/* ===== SOUND ===== */
let audio;
function startSound(){
audio=new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
audio.loop=true;
audio.volume=0.2;
audio.play();
}

/* ===== INTRO ===== */
let txt="INITIALIZING...\nLOADING SYSTEM...\nWELCOME";
let i=0;

function type(){
if(i<txt.length){
document.getElementById("type").innerText+=txt[i];
i++;
setTimeout(type,40);
}
}
type();

/* START */
function startSystem(){
document.getElementById("intro").style.display="none";
document.getElementById("main").style.opacity="1";
startSound();
}

/* ===== CHATBOT ===== */

const API_KEY=""; // এখানে key দিলে real AI, না দিলে fallback

async function send(e){
if(e.key==="Enter"){
let input=e.target.value;
let chat=document.getElementById("chat");

chat.innerHTML+="<div>> "+input+"</div>";

if(API_KEY){
let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"Reply in Bangla if user writes Bangla."},
{role:"user",content:input}
]
})
});

let data=await res.json();
let reply=data.choices[0].message.content;
chat.innerHTML+="<div style='color:#0ff'>AI: "+reply+"</div>";
}
else{
/* fallback */
let reply="আমি বুঝতে পারিনি";
if(input.includes("hello")||input.includes("hi")) reply="হ্যালো 👋";
if(input.includes("হ্যাক")) reply="Ethical hacking শেখো 👍";
if(input.includes("security")) reply="Security মানে protection";

chat.innerHTML+="<div style='color:#0ff'>AI: "+reply+"</div>";
}

e.target.value="";
chat.scrollTop=chat.scrollHeight;
}
}

</script>

</body>
</html>
